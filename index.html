<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Fortune Telling Registration</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Fortune Telling Registration</h1>

      <form id="fortuneForm">

        <input
          id="name"
          type="text"
          placeholder="Full Name"
          required>

        <input
          id="customerId"
          type="text"
          placeholder="ID Number"
          required>

        <input
          id="email"
          type="email"
          placeholder="Email Address"
          required>

        <label>Birth Date</label>
        <input
          id="birthdate"
          type="date"
          required>

        <label>Birth Time</label>
        <input
          id="birthtime"
          type="time">

        <input
          id="birthplace"
          type="text"
          placeholder="Birth Place"
          required>

        <select
          id="question"
          required>

          <option value="">
            Loading questions...
          </option>

        </select>

        <button
          id="submitBtn"
          type="submit">

          Book Now

        </button>

      </form>

      <div id="message"></div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
