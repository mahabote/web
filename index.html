<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

<script>

const API_URL =
  "YOUR_APPS_SCRIPT_WEBAPP_URL";

document.addEventListener(
  "DOMContentLoaded",
  function () {

    loadQuestions();

  }
);

async function loadQuestions() {

  try {

    const response =
      await fetch(API_URL);

    const data =
      await response.json();

    const select =
      document.getElementById("question");

    select.innerHTML = "";

    data.forEach(item => {

      const option =
        document.createElement("option");

      option.value = item;
      option.textContent = item;

      select.appendChild(option);

    });

    M.FormSelect.init(
      document.querySelectorAll("select")
    );

  }
  catch(error) {

    console.error(error);

    M.toast({
      html: "Unable to load questions"
    });

  }

}

async function submitForm() {

  const userInfo = {

    customerId:
      document.getElementById(
        "customerId"
      ).value,

    name:
      document.getElementById(
        "name"
      ).value,

    email:
      document.getElementById(
        "email"
      ).value,

    birthdate:
      document.getElementById(
        "birthdate"
      ).value,

    birthtime:
      document.getElementById(
        "birthtime"
      ).value,

    birthplace:
      document.getElementById(
        "birthplace"
      ).value,

    question:
      document.getElementById(
        "question"
      ).value

  };

  if (
    !userInfo.name ||
    !userInfo.customerId ||
    !userInfo.email
  ) {

    M.toast({
      html: "Please complete all required fields"
    });

    return;
  }

  try {

    await fetch(
      API_URL,
      {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(userInfo)
      }
    );

    M.toast({
      html: "Registration Saved"
    });

    document
      .getElementById(
        "fortuneForm"
      )
      .reset();

    M.updateTextFields();

  }
  catch(error) {

    console.error(error);

    M.toast({
      html: "Submission Failed"
    });

  }

}

</script>
