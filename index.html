<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Fortune Telling Registration</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <h1>Fortune Telling Registration</h1>

    <form id="fortuneForm">

      <input
        id="name"
        type="text"
        placeholder="Full Name"
        >

      <input
        id="customerId"
        type="text"
        placeholder="ID Number"
        >

      <input
        id="email"
        type="email"
        placeholder="Email"
        >

      <label>Birth Date</label>

      <input
        id="birthdate"
        type="date"
        >

      <label>Birth Time</label>

      <input
        id="birthtime"
        type="time">

      <input
        id="birthplace"
        type="text"
        placeholder="Birth Place"
        >

      <select
        id="question"
        >

        <option>
          Loading...
        </option>

      </select>

      <button
        id="submitBtn"
        type="submit">

        Book Now

      </button>

    </form>

    <div id="message"></div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
